#cloud-config
# cloud-init para ntp-servidor.
# Instala chrony, instala configuracao de servidor, libera UDP/123 e
# instala o logger CSV.

package_update: true
packages:
  - chrony

write_files:
  - path: /etc/chrony/chrony.conf
    permissions: '0644'
    owner: root:root
    content: |
      # chrony-servidor.conf — servidor NTP da subrede multipass
      pool 2.pool.ntp.org iburst maxsources 4
      allow 10.0.0.0/8
      allow 192.168.0.0/16
      allow 172.16.0.0/12
      local stratum 8
      makestep 1.0 3
      driftfile /var/lib/chrony/drift
      rtcsync
      logdir /var/log/chrony
      log measurements statistics tracking

  - path: /usr/local/bin/log-offset.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/bin/bash
      # log-offset.sh — appendar 1 linha/s ao CSV com metricas de chronyc tracking.
      HOSTNAME=$(hostname)
      CSV=/var/log/chrony/offset-${HOSTNAME}.csv
      if [ ! -f "$CSV" ]; then
        echo "timestamp,last_offset_s,rms_offset_s,frequency_ppm" > "$CSV"
      fi
      while true; do
        TS=$(date -Ins)
        LINE=$(chronyc tracking 2>/dev/null | awk -F': *' '
          /Last offset/    {gsub(/ seconds/, "", $2); lo=$2}
          /RMS offset/     {gsub(/ seconds/, "", $2); ro=$2}
          /Frequency/      {split($2, a, " "); f=a[1]; if (a[2]=="ppm" && a[3]=="slow") f=-f; }
          END {print lo "," ro "," f}')
        echo "${TS},${LINE}" >> "$CSV"
        sleep 1
      done

  - path: /etc/systemd/system/log-offset.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=NTP offset CSV logger
      After=chrony.service
      Requires=chrony.service

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/log-offset.sh
      Restart=always

      [Install]
      WantedBy=multi-user.target

runcmd:
  - systemctl enable chrony
  - systemctl restart chrony
  - systemctl daemon-reload
  - systemctl enable --now log-offset.service
