# chrony-cliente.conf — cliente NTP padrao (step + slew)
#
# Papel: sincronizar com ntp-servidor da subrede multipass.
# Estrategia: makestep ativo => grandes desvios sao corrigidos com salto;
# pequenos desvios sao absorvidos via slew.

# Fonte de tempo: o servidor da subrede. iburst => rajada inicial para
# convergencia rapida no primeiro contato.
server SERVIDOR_IP iburst

# Fronteira step/slew: se |offset| > 1s nas primeiras 3 medidas, faz step;
# depois disso, qualquer correcao e via slew (gradual).
makestep 1.0 3

# Persiste o drift do oscilador local entre reinicios.
driftfile /var/lib/chrony/drift

# Sincroniza o RTC (Real Time Clock do hardware) com o relogio do sistema.
rtcsync

# Logs para inspecao no Nivel 1.
logdir /var/log/chrony
log measurements statistics tracking
