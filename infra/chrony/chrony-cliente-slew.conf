# chrony-cliente-slew.conf — cliente NTP com slew PURO (sem step)
#
# Papel: demonstrar visualmente o custo de corrigir grandes offsets sem step.
# Diferenca chave em relacao a chrony-cliente.conf: ausencia de `makestep`.
#
# Sem makestep, o chrony NUNCA salta o relogio. Mesmo um offset de 60s e
# absorvido linearmente, limitado pela taxa maxima de slew do kernel Linux
# (~500 ppm = 1 segundo de correcao a cada ~2000 segundos reais).
# Convergencia esperada para offset de 60s: aproximadamente 30 minutos.

# Fonte de tempo: o servidor da subrede.
server SERVIDOR_IP iburst

# (Diretiva makestep DELIBERADAMENTE AUSENTE.)
# Aluno deve identificar essa diferenca no Nivel 1.

# Persiste o drift do oscilador local entre reinicios.
driftfile /var/lib/chrony/drift

# Sincroniza o RTC (Real Time Clock do hardware) com o relogio do sistema.
rtcsync

# Logs para inspecao no Nivel 1.
logdir /var/log/chrony
log measurements statistics tracking
