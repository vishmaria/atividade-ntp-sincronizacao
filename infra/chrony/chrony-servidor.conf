# chrony-servidor.conf — servidor NTP da subrede multipass
#
# Papel: stratum baixo da subrede; serve tempo aos clientes ntp-cliente-*.
# Fontes upstream: pool publico (quando disponivel) + stratum 8 local como
# fallback, para que o servidor responda mesmo sem Internet.

# Upstream: pool publico (se houver Internet)
pool 2.pool.ntp.org iburst maxsources 4

# Servir tempo a clientes da subrede privada multipass (10.x.x.x ou 192.168.64.x)
allow 10.0.0.0/8
allow 192.168.0.0/16
allow 172.16.0.0/12

# Fallback: se nenhum upstream estiver acessivel, este servidor responde como
# stratum 8 (referencia local). Em laboratorio isolado isso permite que
# clientes ainda sincronizem; em producao essa configuracao seria perigosa
# porque um servidor pode mentir sem ser detectado.
local stratum 8

# Step inicial generoso: ao bootar, salta se desvio > 1s nas primeiras 3 medidas.
makestep 1.0 3

# Persiste o drift do oscilador entre reinicios.
driftfile /var/lib/chrony/drift

# Sincroniza o RTC (Real Time Clock do hardware) com o relogio do sistema.
rtcsync

# Logs para inspecao no Nivel 1.
logdir /var/log/chrony
log measurements statistics tracking
